# Dependabot configuration.
#
# github-actions is the only ecosystem with trackable dependencies *today*
# (the workflow actions). pip and docker are configured proactively but are
# currently inert:
#   - pip:    no Python manifest exists yet (scripts are stdlib-only). Dependabot
#             will start opening PRs once a requirements.txt/pyproject.toml lands.
#   - docker: compose images are pinned via the ${STACK_VERSION} env var, which
#             Dependabot cannot bump. It activates if an image gets a literal tag
#             or a Dockerfile is added.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker:
        patterns:
          - "*"
