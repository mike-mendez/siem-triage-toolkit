services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:${STACK_VERSION}
    volumes:
      - esdata:/usr/share/elasticsearch/data
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    networks: [elastic]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana-wolfi:${STACK_VERSION}
    restart: always
    env_file: [.env]
    volumes:
      - ./config/kibana/kibana.http.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks: [elastic]
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  # victim-nginx:
  #   build: ./victim/nginx
  #   container_name: victim-nginx
  #   ports:
  #     - "8080:80"
  #   networks:
  #     - elastic

volumes:
  esdata:
    name: elk_esdata
    driver: local

networks:
  elastic:
    driver: bridge
