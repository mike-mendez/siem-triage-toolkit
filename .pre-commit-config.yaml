# Pre-commit hooks for siem-triage-toolkit.
# Every rev is pinned to an exact tag (no floating refs): autoupdating against
# untrusted third-party hooks is itself a supply-chain risk.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # Enforce Conventional Commits at the commit-msg stage.
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Local guard: reject any commit message that reintroduces a Claude/Anthropic
  # co-author or "Generated with Claude Code" trailer. Anchored to line start (?im)
  # so it only catches real trailer lines, not prose that mentions the phrase.
  # Deterministic backstop if the Claude Code `attribution` setting is ever absent.
  - repo: local
    hooks:
      - id: block-claude-attribution
        name: Block Claude co-author / generated-by trailers
        language: pygrep
        entry: '(?im)^[ \t]*(co-authored-by:.*(claude|anthropic)|(🤖[ \t]*)?generated with claude code)'
        stages: [commit-msg]
